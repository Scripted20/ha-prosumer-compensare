###############################################################################
#
#  PROSUMER COMPENSARE - Home Assistant Package
#  Calcul compensare energie pentru prosumeri Romania
#
#  Autor: github.com/calintamas
#  Licenta: MIT
#
#  ============================================================================
#  CONFIGURARE - PASUL 1
#  ============================================================================
#
#  Inlocuieste TOATE aparitiile urmatorilor placeholders cu entity ID-urile
#  tale reale din Home Assistant.
#
#  Foloseste FIND & REPLACE (Ctrl+H) in editorul tau:
#
#  PLACEHOLDER                          →  EXEMPLU (Deye 10KW via Solarman)
#  ─────────────────────────────────────────────────────────────────────────
#  sensor.YOUR_TOTAL_ENERGY_IMPORT      →  sensor.inverter_deye_10kw_total_energy_import
#  sensor.YOUR_TOTAL_ENERGY_EXPORT      →  sensor.inverter_deye_10kw_total_energy_export
#  sensor.YOUR_TODAY_ENERGY_IMPORT      →  sensor.inverter_deye_10kw_today_energy_import
#  sensor.YOUR_TODAY_ENERGY_EXPORT      →  sensor.inverter_deye_10kw_today_energy_export
#  sensor.YOUR_GRID_POWER              →  sensor.inverter_deye_10kw_grid_power
#  sensor.YOUR_PV_POWER                →  sensor.inverter_deye_10kw_pv_power
#  sensor.YOUR_BATTERY_SOC             →  sensor.inverter_deye_10kw_battery
#
#  Cum gasesti entity ID-urile tale:
#    Developer Tools → States → cauta "total_energy_import" sau "grid_power"
#
#  ============================================================================
#  CONFIGURARE - PASUL 2 (optional)
#  ============================================================================
#
#  Dupa restart, mergi la:
#    Settings → Devices → Helpers → cauta "pret_import" / "pret_export"
#  si modifica preturile la valorile tale reale.
#
#  Preturile implicite:
#    Import: 1.16 RON/kWh
#    Export: 0.464 RON/kWh
#    Raport compensare: 2.5 (pentru 2.5 kWh exportati primesti 1 kWh gratuit)
#
###############################################################################


# =============================================================================
# INPUT NUMBERS - Preturi configurabile din UI
# =============================================================================
input_number:
  pret_import_kwh:
    name: "Pret import energie (RON/kWh)"
    min: 0.3
    max: 5.0
    step: 0.001
    initial: 1.16
    unit_of_measurement: "RON/kWh"
    icon: mdi:cash-minus
    mode: box

  pret_export_kwh:
    name: "Pret export energie (RON/kWh)"
    min: 0.1
    max: 3.0
    step: 0.001
    initial: 0.464
    unit_of_measurement: "RON/kWh"
    icon: mdi:cash-plus
    mode: box

  raport_compensare:
    name: "Raport compensare (export:import)"
    min: 1.0
    max: 5.0
    step: 0.1
    initial: 2.5
    unit_of_measurement: "x"
    icon: mdi:scale-balance
    mode: box


# =============================================================================
# UTILITY METERS - Tracking energie din Martie
#
# Ciclul anual: offset 59 zile = resetare pe ~1 Martie (nu 1 Ianuarie)
# Ciclul lunar: resetare standard pe 1 a fiecarei luni
# =============================================================================
utility_meter:
  prosumer_import_anual:
    source: sensor.YOUR_TOTAL_ENERGY_IMPORT
    name: "Prosumer Import (din Martie)"
    cycle: yearly
    offset:
      days: 59

  prosumer_export_anual:
    source: sensor.YOUR_TOTAL_ENERGY_EXPORT
    name: "Prosumer Export (din Martie)"
    cycle: yearly
    offset:
      days: 59

  prosumer_import_lunar:
    source: sensor.YOUR_TOTAL_ENERGY_IMPORT
    name: "Import Lunar"
    cycle: monthly

  prosumer_export_lunar:
    source: sensor.YOUR_TOTAL_ENERGY_EXPORT
    name: "Export Lunar"
    cycle: monthly


# =============================================================================
# TEMPLATE SENSORS - Calculele de compensare
# =============================================================================
template:
  - sensor:
      # -----------------------------------------------------------------
      # Credit Gratuit (kWh)
      # Formula: (export_din_martie / raport) - import_din_martie
      # Pozitiv = ai credit (poti importa gratuit)
      # Negativ = ai depasit creditul (platesti diferenta)
      # -----------------------------------------------------------------
      - name: "Prosumer Credit Gratuit kWh"
        unique_id: prosumer_credit_gratuit_kwh
        unit_of_measurement: "kWh"
        device_class: energy
        icon: >
          {% set credit = ((states('sensor.prosumer_export_anual') | float(0)) / (states('input_number.raport_compensare') | float(2.5))) - (states('sensor.prosumer_import_anual') | float(0)) %}
          {% if credit >= 0 %}mdi:battery-plus-variant{% else %}mdi:battery-minus-variant{% endif %}
        state: >
          {% set exported = states('sensor.prosumer_export_anual') | float(0) %}
          {% set imported = states('sensor.prosumer_import_anual') | float(0) %}
          {% set raport = states('input_number.raport_compensare') | float(2.5) %}
          {{ ((exported / raport) - imported) | round(1) }}
        attributes:
          exported_din_martie: "{{ states('sensor.prosumer_export_anual') | float(0) | round(1) }}"
          imported_din_martie: "{{ states('sensor.prosumer_import_anual') | float(0) | round(1) }}"
          echivalent_gratuit_din_export: "{{ (states('sensor.prosumer_export_anual') | float(0) / states('input_number.raport_compensare') | float(2.5)) | round(1) }}"
          status: >
            {% set credit = ((states('sensor.prosumer_export_anual') | float(0)) / (states('input_number.raport_compensare') | float(2.5))) - (states('sensor.prosumer_import_anual') | float(0)) %}
            {% if credit > 10 %}Ai credit bun!
            {% elif credit > 0 %}Credit pozitiv
            {% elif credit > -10 %}Aproape echilibru
            {% else %}Depasit - platesti diferenta{% endif %}

      # -----------------------------------------------------------------
      # Credit Gratuit (RON)
      # Formula: (export * pret_export) - (import * pret_import)
      # -----------------------------------------------------------------
      - name: "Prosumer Credit Gratuit RON"
        unique_id: prosumer_credit_gratuit_ron
        unit_of_measurement: "RON"
        icon: mdi:cash-multiple
        state: >
          {% set exported = states('sensor.prosumer_export_anual') | float(0) %}
          {% set imported = states('sensor.prosumer_import_anual') | float(0) %}
          {% set pret_export = states('input_number.pret_export_kwh') | float(0.464) %}
          {% set pret_import = states('input_number.pret_import_kwh') | float(1.16) %}
          {{ ((exported * pret_export) - (imported * pret_import)) | round(2) }}

      # -----------------------------------------------------------------
      # Balanta Azi (kWh gratuit castigat/pierdut azi)
      # -----------------------------------------------------------------
      - name: "Prosumer Balanta Azi kWh"
        unique_id: prosumer_balanta_azi_kwh
        unit_of_measurement: "kWh"
        icon: mdi:scale-balance
        state: >
          {% set exported = states('sensor.YOUR_TODAY_ENERGY_EXPORT') | float(0) %}
          {% set imported = states('sensor.YOUR_TODAY_ENERGY_IMPORT') | float(0) %}
          {% set raport = states('input_number.raport_compensare') | float(2.5) %}
          {{ ((exported / raport) - imported) | round(2) }}

      # -----------------------------------------------------------------
      # Balanta Luna Curenta (kWh)
      # -----------------------------------------------------------------
      - name: "Prosumer Balanta Luna kWh"
        unique_id: prosumer_balanta_luna_kwh
        unit_of_measurement: "kWh"
        icon: mdi:calendar-month
        state: >
          {% set exported = states('sensor.prosumer_export_lunar') | float(0) %}
          {% set imported = states('sensor.prosumer_import_lunar') | float(0) %}
          {% set raport = states('input_number.raport_compensare') | float(2.5) %}
          {{ ((exported / raport) - imported) | round(1) }}

      # -----------------------------------------------------------------
      # Procent Compensare - cat % din import e acoperit de export
      # -----------------------------------------------------------------
      - name: "Prosumer Procent Compensare"
        unique_id: prosumer_procent_compensare
        unit_of_measurement: "%"
        icon: mdi:percent
        state: >
          {% set exported = states('sensor.prosumer_export_anual') | float(0) %}
          {% set imported = states('sensor.prosumer_import_anual') | float(0) %}
          {% set raport = states('input_number.raport_compensare') | float(2.5) %}
          {% set credit_kwh = exported / raport %}
          {% if imported > 0 %}
            {{ ((credit_kwh / imported) * 100) | round(1) }}
          {% elif credit_kwh > 0 %}
            100
          {% else %}
            0
          {% endif %}

      # -----------------------------------------------------------------
      # Directie Grid - afiseaza daca importi sau exporti in timp real
      # -----------------------------------------------------------------
      - name: "Grid Directie Acum"
        unique_id: grid_directie_acum
        icon: >
          {% set grid = states('sensor.YOUR_GRID_POWER') | float(0) %}
          {% if grid > 50 %}mdi:transmission-tower-import
          {% elif grid < -50 %}mdi:transmission-tower-export
          {% else %}mdi:transmission-tower{% endif %}
        state: >
          {% set grid = states('sensor.YOUR_GRID_POWER') | float(0) %}
          {% if grid > 50 %}Import {{ grid | round(0) }}W
          {% elif grid < -50 %}Export {{ (grid | abs) | round(0) }}W
          {% else %}Echilibru{% endif %}
